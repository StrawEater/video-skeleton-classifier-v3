base: base.yaml

experiment:
  name: oakink2_action_only_multimodal_tiny
  modality: multimodal

dataset:
  name: oakink2
  train_split: /data/data3/junibg-ego/Proyectos/skeleton-video-classifier/DATA/OakInkV2/label_split/action_train.txt
  val_split:   /data/data3/junibg-ego/Proyectos/skeleton-video-classifier/DATA/OakInkV2/label_split/action_val.txt
  test_split:  /data/data3/junibg-ego/Proyectos/skeleton-video-classifier/DATA/OakInkV2/label_split/action_test.txt
  frames_root:    /data/data3/junibg-ego/Proyectos/skeleton-video-classifier/DATA/OakInkV2/scenes
  keypoints_root: /data/data3/junibg-ego/Proyectos/skeleton-video-classifier/DATA/OakInkV2/hand_keypoints

  num_classes: 68       # 68 unique actions (object tag removed)
  action_only: true
  min_class_samples: null   # e.g. 11 → 36 classes, median=18 (same as H2O)
  weighted_sampling: true

  clip_len: 8
  num_joints: 21
  num_hands: 2
  normalize_skeleton: true
  with_jitter: true
  max_train_samples: null

model:
  size: tiny
  video_pretrained: false
  skeleton_pretrained: false
  video_pretrained_path: null
  skeleton_pretrained_path: null
  fusion_depth: 4
  fusion_strategy: weighted

training:
  total_epochs: 35
  learning_rate: 2.0e-4
  weight_decay: 0.01
  lr_patience: 3
  stop_patience: 10
