base: base.yaml

experiment:
  name: oakink2_multimodal_tiny
  modality: multimodal

dataset:
  name: oakink2
  train_split: /data/data3/junibg-ego/Proyectos/skeleton-video-classifier/DATA/OakInkV2/label_split/action_train.txt
  val_split:   /data/data3/junibg-ego/Proyectos/skeleton-video-classifier/DATA/OakInkV2/label_split/action_val.txt
  test_split:  /data/data3/junibg-ego/Proyectos/skeleton-video-classifier/DATA/OakInkV2/label_split/action_test.txt
  frames_root:    /data/data3/junibg-ego/Proyectos/skeleton-video-classifier/DATA/OakInkV2/scenes
  keypoints_root: /data/data3/junibg-ego/Proyectos/skeleton-video-classifier/DATA/OakInkV2/hand_keypoints

  num_classes: 306
  clip_len: 8
  num_joints: 21
  num_hands: 2
  normalize_skeleton: true
  with_jitter: true
  max_train_samples: null
  min_class_samples: null   # e.g. 5 — drops classes with fewer total segments

model:
  size: tiny          # tiny | small | medium (applies to both video and skeleton encoders)

  # Pretrained backbone weights
  video_pretrained: false
  skeleton_pretrained: false
  video_pretrained_path: null    # null = auto-resolve from pretrained_dir
  skeleton_pretrained_path: null

  # Fusion head
  fusion_depth: 4               # Mamba blocks in the fusion head
  fusion_strategy: weighted     # weighted | context | new | average

training:
  total_epochs: 35    # multimodal converges faster when using pretrained encoders
  learning_rate: 2.0e-4
  weight_decay: 0.01
  lr_patience: 3
  stop_patience: 10
