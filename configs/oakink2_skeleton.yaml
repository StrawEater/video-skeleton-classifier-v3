base: base.yaml

experiment:
  name: oakink2_skeleton
  modality: skeleton

dataset:
  name: oakink2
  train_split: /data/data3/junibg-ego/Proyectos/skeleton-video-classifier/DATA/OakInkV2_jpeg/label_split/action_train.txt
  val_split:   /data/data3/junibg-ego/Proyectos/skeleton-video-classifier/DATA/OakInkV2_jpeg/label_split/action_val.txt
  test_split:  /data/data3/junibg-ego/Proyectos/skeleton-video-classifier/DATA/OakInkV2_jpeg/label_split/action_test.txt
  keypoints_root:       /data/data3/junibg-ego/Proyectos/skeleton-video-classifier/DATA/OakInkV2_jpeg/hand_keypoints
  wrist_positions_root: /data/data3/junibg-ego/Proyectos/skeleton-video-classifier/DATA/OakInkV2_jpeg/wrist_positions

  num_classes: 262    # 306 original minus 44 'hold' classes
  clip_len: 8
  num_joints: 21      # per hand; model receives num_joints * num_hands = 42
  num_hands: 2
  normalize_skeleton: false   # keypoints are wrist-centered; wrist joint = global position
  with_jitter: true
  num_eval_clips: 8           # clips sampled across the segment at eval time; logits are averaged
  max_train_samples: null
  min_class_samples: null

model:
  size: tiny      # overridden by sweep
  pretrained: true
  pretrained_path: null   # null = auto-resolve from pretrained_dir

training:
  total_epochs: 200
  learning_rate: 2.0e-4
  weight_decay: 0.05
