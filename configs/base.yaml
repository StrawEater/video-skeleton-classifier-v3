# Shared training defaults inherited by all configs.
# Override any field in the child config.
training:
  # Path to pretrained backbone weights (.pth files).
  # This whole folder is synced to the cloud.
  pretrained_dir: /workspace/video-skeleton-classifier-v3/pretrained

  # Where to save checkpoints. One sub-directory per experiment name.
  checkpoint_dir: checkpoints

  # null → auto (16 for skeleton/video 8f, 8 for multimodal 8f, 4 for 32f)
  batch_size: null
  num_workers: 8

  total_epochs: 80
  learning_rate: 2.0e-4
  weight_decay: 0.05
  warmup_fraction: 0.05        # fraction of total_epochs used for linear warmup
  cosine_t_max_multiplier: 1.0 # >1 slows the cosine decay (e.g. 2.0 → reaches ~70% LR at end)
  grad_clip: 1.0

  # Learning-rate patience: reduce LR by lr_factor after this many epochs without val improvement
  lr_patience: 10
  lr_factor: 0.5
  # Stop training after this many epochs without val improvement
  stop_patience: 25

  # Skip experiment if checkpoint_dir already exists (useful for grid searches)
  skip_if_exists: true

dataset:
  name: oakink2
  train_split: /root/DATA/OakInkV2_jpeg/label_split/action_train.txt
  val_split:   /root/DATA/OakInkV2_jpeg/label_split/action_val.txt
  test_split:  /root/DATA/OakInkV2_jpeg/label_split/action_test.txt
  frames_root:          /root/DATA/OakInkV2_jpeg/scenes
  keypoints_root:       /root/DATA/OakInkV2_jpeg/hand_keypoints
  wrist_positions_root: /root/DATA/OakInkV2_jpeg/wrist_positions

  num_classes: 31     # action-only classes with >= 25 segments in the full dataset
  clip_len: 8
  num_joints: 21      # per hand; model receives num_joints * num_hands = 42
  num_hands: 2
  normalize_skeleton: false   # keypoints are wrist-centered; wrist joint = global position
  with_jitter: true
  num_eval_clips: 8           # clips sampled across the segment at eval time; logits are averaged
  action_only: true
  max_train_samples: null
  min_class_samples: 25