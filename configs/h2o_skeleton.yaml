base: base.yaml

experiment:
  name: h2o_skeleton_tiny
  modality: skeleton

dataset:
  name: h2o
  train_split:   /data/data3/junibg-ego/Proyectos/skeleton-video-classifier/DATA/H2O/label_split/action_train.txt
  val_split:     /data/data3/junibg-ego/Proyectos/skeleton-video-classifier/DATA/H2O/label_split/action_val.txt
  test_split:    /data/data3/junibg-ego/Proyectos/skeleton-video-classifier/DATA/H2O/label_split/action_test.txt
  skeleton_root: /data/data3/junibg-ego/Proyectos/skeleton-video-classifier/DATA/H2O
  skeleton_format: txt

  num_classes: 36
  clip_len: 8
  num_joints: 21
  num_hands: 2
  normalize_skeleton: true
  with_jitter: true
  max_train_samples: null

model:
  size: tiny
  pretrained: false
  pretrained_path: null

training:
  total_epochs: 200
  learning_rate: 2.0e-4
  weight_decay: 0.05
