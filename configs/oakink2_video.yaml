base: base.yaml

experiment:
  name: oakink2_video
  modality: video

dataset:
  name: oakink2
  train_split: /root/DATA/OakInkV2_jpeg/label_split/action_train.txt
  val_split:   /root/DATA/OakInkV2_jpeg/label_split/action_val.txt
  test_split:  /root/DATA/OakInkV2_jpeg/label_split/action_test.txt
  frames_root: /root/DATA/OakInkV2_jpeg/scenes

  num_classes: 262    # 306 original minus 44 'hold' classes
  clip_len: 8
  with_jitter: true
  num_eval_clips: 8           # clips sampled across the segment at eval time; logits are averaged
  max_train_samples: null
  min_class_samples: null

model:
  size: tiny      # overridden by sweep
  pretrained: true
  pretrained_path: null   # null = auto-resolve from pretrained_dir

training:
  total_epochs: 80
  learning_rate: 2.0e-4
  weight_decay: 0.01
